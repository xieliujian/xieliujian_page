<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>xieliujian — Unity 作品集</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <span class="logo">xieliujian</span>
  </nav>

  <section class="hero">
    <h1>xieliujian</h1>
    <p>Unity 开发者 · 游戏 &amp; 互动体验</p>
    <div class="links">
      <a href="https://github.com/xieliujian" target="_blank" rel="noopener">GitHub</a>
    </div>
  </section>

  <section class="section">
    <h2>作品集</h2>
    <div class="projects-grid">

      <!-- 示例项目卡片 —— 复制此块可添加新项目 -->
      <a class="project-card" href="projects/demo-game/">
        <img
          src="assets/thumbnails/demo-game.png"
          onerror="this.style.background='#30363d';this.removeAttribute('src')"
          alt="Demo Game"
        />
        <div class="card-body">
          <div class="card-title">Demo Game</div>
          <div class="card-desc">示例 Unity WebGL 项目。将构建产物放入对应目录后即可运行。</div>
          <span class="card-tag">Unity WebGL</span>
        </div>
      </a>

      <!-- 在此继续添加更多项目卡片 -->

    </div>
  </section>

  <footer>
    <p>© 2026 xieliujian · Built with HTML &amp; CSS</p>
  </footer>

</body>
</html>
