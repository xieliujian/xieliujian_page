<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工具插件 — xieliujian</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    .plugin-header {
      max-width: 860px;
      margin: 0 auto;
      padding: 3.5rem 2rem 1.5rem;
    }
    .plugin-header h1 { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; }
    .plugin-header p { color: var(--text-muted); font-size: 0.95rem; }

    .plugin-list {
      max-width: 860px;
      margin: 0 auto;
      padding: 0.5rem 2rem 5rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    /* ── 文件夹分组 ── */
    .folder-group {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .folder-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1.25rem;
      background: var(--surface);
      cursor: pointer;
      user-select: none;
      transition: background var(--transition);
    }
    .folder-header:hover { background: #1c2128; }
    .folder-icon { font-size: 1.2rem; flex-shrink: 0; }
    .folder-name { font-size: 0.95rem; font-weight: 700; flex: 1; }
    .folder-count { font-size: 0.8rem; color: var(--text-muted); }
    .chevron {
      font-size: 0.75rem;
      color: var(--text-muted);
      transition: transform 0.2s ease;
    }
    .folder-group.open .chevron { transform: rotate(90deg); }
    .folder-children {
      display: none;
      flex-direction: column;
      border-top: 1px solid var(--border);
    }
    .folder-group.open .folder-children { display: flex; }

    /* ── 单个文件行 ── */
    .plugin-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.85rem 1.25rem;
      background: var(--surface);
      transition: background var(--transition);
    }
    .plugin-item + .plugin-item { border-top: 1px solid var(--border); }
    .plugin-item:hover { background: #1c2128; }

    /* 根级文件有独立边框 */
    .plugin-item.root-item {
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .plugin-item.root-item:hover { border-color: var(--accent); }

    /* 子文件缩进 */
    .plugin-item.child-item { padding-left: 2rem; }

    .file-icon { font-size: 1.2rem; flex-shrink: 0; width: 1.6rem; text-align: center; }
    .file-info { flex: 1; min-width: 0; }
    .file-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      word-break: break-all;
    }
    .file-desc { font-size: 0.82rem; color: var(--text-muted); margin-top: 0.3rem; line-height: 1.5; }
    .file-size { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.2rem; }

    .file-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.35rem 0.85rem;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition), color var(--transition);
      text-decoration: none;
      white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #0d1117; border-color: var(--accent); }
    .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #0d1117; }
    .btn-secondary { background: transparent; color: var(--text-muted); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    .status-bar {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 2rem 1rem;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .skeleton {
      height: 62px;
      border-radius: var(--radius);
      background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    .error-msg {
      background: rgba(248,81,73,.1);
      border: 1px solid rgba(248,81,73,.4);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      color: #f85149;
      font-size: 0.9rem;
    }

    @media (max-width: 540px) {
      .plugin-item { flex-wrap: wrap; }
      .file-actions { width: 100%; justify-content: flex-end; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a class="logo" href="../">xieliujian</a>
    <a class="back-link" href="../">← 返回作品集</a>
  </nav>

  <div class="plugin-header">
    <h1>工具插件</h1>
    <p>Unity 插件与工具资源，点击下载。源仓库：<a href="https://github.com/xieliujian/unity_plugin" target="_blank" rel="noopener">xieliujian/unity_plugin</a></p>
  </div>

  <div class="status-bar" id="status-bar"></div>

  <div class="plugin-list" id="plugin-list">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>

  <footer>
    <p>© 2026 xieliujian · Built with HTML &amp; CSS</p>
  </footer>

  <script>
    const REPO = 'xieliujian/unity_plugin';

    // 按文件名（精确匹配）提供中文描述
    const DESCRIPTIONS = {
      'Digital Glitches.unitypackage':
        '屏幕故障特效插件，提供多种数字失真、扫描线、色差等 Glitch 视觉效果，适用于赛博朋克/黑客风格场景。',
      'Fast Glitch Mobile URP VR AR LWRP.unitypackage':
        '轻量级 Glitch 后处理插件，专为移动端优化，兼容 URP / LWRP / VR / AR 管线，性能开销极低。',
      'Fast_Mobile_Post_Processing_Color_CorrectionLUT_Blur_Bloom_LWRP_URP_1.7.unitypackage':
        '移动端高性能后处理套件，包含 LUT 调色、颜色校正、模糊（Blur）和泛光（Bloom），支持 LWRP / URP，适合手游项目。',
      'Odin - Inspector and Serializer 2.1.13.unitypackage':
        '功能强大的 Inspector 增强与序列化框架，提供丰富的特性标签（Attribute）、自定义 Inspector 布局及高性能序列化，是 Unity 开发必备插件之一。',
      'ShaderVariantStripping_ExampleProject.zip':
        'Shader 变体裁剪示例工程，演示如何在构建时通过 IPreprocessShaders 接口剔除无用 Shader 变体，有效减少包体大小和加载时间。',
      'UIGamma2Linear.7z':
        'UI Gamma 转 Linear 工具，解决在 Linear 颜色空间项目中 UI 贴图显示偏亮的问题，提供脚本与 Shader 两种修正方案。',
      'box-projection.unitypackage':
        '盒式投影反射（Box Projection Cubemap）插件，用于室内场景的局部反射修正，使反射探针在封闭空间中呈现更准确的透视效果。',
      'lua-protobuf-0.3.2.zip':
        'Lua 版 Protocol Buffers 库，支持在 Lua 环境中编解码 .proto 定义的消息，常用于 Unity + XLua/tolua 热更新架构的网络协议层。',
      'MightyAndPowerfulGames.rar':
        'Mighty And Powerful Games 插件合集压缩包，包含该团队发布的 Unity 资源与工具插件，解压后可按需导入 Unity 项目使用。',
      // MeshCombine 子文件
      'MCS Caves Overhangs 1.31.unitypackage':
        '洞穴与悬崖地形插件，可快速生成凹凸起伏的洞穴、悬挂岩壁等复杂地形网格，与 Mesh Combine Studio 配合使用效果更佳。',
      'Mesh Combine Studio 2 2.997.unitypackage':
        '网格合并工具，可将场景中大量静态物体的 Mesh 自动合批合并为少量 Draw Call，显著提升运行时渲染性能，支持 LOD 与区块化合并。',
    };

    function formatSize(bytes) {
      if (!bytes) return '';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1024 / 1024).toFixed(1) + ' MB';
    }

    function getIcon(name) {
      const ext = name.split('.').pop().toLowerCase();
      return { unitypackage: '🔷', zip: '📦', '7z': '📦', rar: '📦', gz: '📦', md: '📄' }[ext] || '📄';
    }

    function buildFileRow(file, cls = '') {
      const row = document.createElement('div');
      row.className = 'plugin-item' + (cls ? ' ' + cls : '');
      const desc = DESCRIPTIONS[file.name] || '';
      row.innerHTML = `
        <div class="file-icon">${getIcon(file.name)}</div>
        <div class="file-info">
          <div class="file-name">${file.name}</div>
          ${desc ? `<div class="file-desc">${desc}</div>` : ''}
          ${file.size ? `<div class="file-size">${formatSize(file.size)}</div>` : ''}
        </div>
        <div class="file-actions">
          <a class="btn btn-primary" href="${file.download_url}" download="${file.name}">↓ 下载</a>
          <a class="btn btn-secondary" href="${file.html_url}" target="_blank" rel="noopener">GitHub</a>
        </div>`;
      return row;
    }

    function buildFolderGroup(dir, children) {
      const group = document.createElement('div');
      group.className = 'folder-group';

      const header = document.createElement('div');
      header.className = 'folder-header';
      header.innerHTML = `
        <div class="folder-icon">📁</div>
        <div class="folder-name">${dir.name}</div>
        <div class="folder-count">${children.length} 个文件</div>
        <div class="chevron">▶</div>`;
      header.addEventListener('click', () => group.classList.toggle('open'));

      const body = document.createElement('div');
      body.className = 'folder-children';
      children.forEach(f => body.appendChild(buildFileRow(f, 'child-item')));

      group.appendChild(header);
      group.appendChild(body);
      return group;
    }

    async function fetchContents(path) {
      const url = `https://api.github.com/repos/${REPO}/contents${path ? '/' + path : ''}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`GitHub API ${res.status}`);
      return res.json();
    }

    async function loadPlugins() {
      const list = document.getElementById('plugin-list');
      const statusBar = document.getElementById('status-bar');

      try {
        const root = await fetchContents('');
        const visible = root.filter(f => f.name !== 'README.md');

        // 并行拉取所有子目录
        const dirItems = visible.filter(f => f.type === 'dir');
        const fileItems = visible.filter(f => f.type === 'file');

        const dirContents = await Promise.all(
          dirItems.map(d => fetchContents(d.path).then(children => ({ dir: d, children })))
        );

        list.innerHTML = '';

        // 先渲染根级文件
        fileItems.forEach(f => list.appendChild(buildFileRow(f, 'root-item')));

        // 再渲染展开的文件夹（默认展开）
        dirContents.forEach(({ dir, children }) => {
          const files = children.filter(c => c.type === 'file');
          const group = buildFolderGroup(dir, files);
          group.classList.add('open');   // 默认展开
          list.appendChild(group);
        });

        const totalFiles = fileItems.length + dirContents.reduce((s, d) => s + d.children.filter(c => c.type === 'file').length, 0);
        statusBar.textContent = `共 ${totalFiles} 个文件 · ${dirItems.length} 个分类目录`;
      } catch (err) {
        list.innerHTML = `<div class="error-msg">加载失败：${err.message}。请稍后重试或直接访问 <a href="https://github.com/${REPO}" target="_blank">GitHub 仓库</a>。</div>`;
      }
    }

    loadPlugins();
  </script>

</body>
</html>
