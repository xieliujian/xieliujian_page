<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sun Shaft — spacetime.effect</title>
  <link rel="stylesheet" href="../../../style.css" />
  <style>
    .demo-hero { max-width: 960px; margin: 0 auto; padding: 2.5rem 1rem 1.5rem; }
    .demo-hero-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 0.75rem; }
    .demo-hero h1 { font-size: 1.5rem; font-weight: 800; font-family: 'Consolas', monospace; }
    .demo-hero .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.25rem; }
    .gh-link {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.45rem 1rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.85rem;
      color: var(--text); text-decoration: none;
      transition: border-color var(--transition), color var(--transition);
    }
    .gh-link:hover { border-color: var(--accent); color: var(--accent); }
    .hero-cta { display: flex; flex-wrap: wrap; gap: 0.65rem; align-items: center; }

    .webgl-block { max-width: 960px; margin: 0 auto 2.5rem; padding: 0 1rem; }
    .webgl-block h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
    .webgl-block .webgl-hint { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem; line-height: 1.5; }
    .webgl-section { margin-bottom: 0.5rem; }
    .webgl-section .section-label {
      font-size: 0.8rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 0.75rem;
    }
    .unity-player-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 960 / 600;
      background: #000;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    #unity-canvas { width: 100%; height: 100%; display: block; background: #000; }
    #unity-loading-bar {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.25rem;
      background: #0d1117;
    }
    .loading-logo { font-size: 2.5rem; }
    .loading-title { font-size: 0.9rem; color: var(--text-muted); }
    #unity-progress-bar-empty {
      width: 220px; height: 5px;
      border-radius: 3px; background: var(--border); overflow: hidden;
    }
    #unity-progress-bar-full {
      height: 100%; width: 0%;
      background: var(--accent); border-radius: 3px;
      transition: width 0.15s ease;
    }
    #unity-warning { position: absolute; top: 0; left: 0; right: 0; z-index: 10; }
    #unity-fullscreen-button {
      position: absolute; bottom: 10px; right: 10px;
      width: 36px; height: 36px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px; cursor: pointer;
      color: #fff; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--transition);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #unity-fullscreen-button:hover,
    #unity-fullscreen-button:active { background: rgba(88,166,255,0.45); }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="logo" href="../../../">xieliujian</a>
    <a class="back-link" href="../">← 返回 spacetime.effect</a>
  </nav>

  <div class="demo-hero">
    <div class="demo-hero-header">
      <div>
        <h1>Sun Shaft</h1>
        <p class="subtitle">com.spacetime.effect 示例 · URP 太阳光轴（体积光）后处理</p>
      </div>
      <div class="hero-cta">
        <a class="gh-link" href="https://github.com/xieliujian/com.spacetime.effect.sample.sunshaft" target="_blank" rel="noopener">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          查看仓库
        </a>
        <a class="gh-link" href="https://github.com/xieliujian/com.spacetime.effect.sample.sunshaft/blob/main/README.md" target="_blank" rel="noopener">README 原文</a>
      </div>
    </div>
  </div>

  <div class="webgl-block">
    <h2>WebGL 演示</h2>
    <div class="webgl-section" aria-label="Sun Shaft WebGL">
      <div class="section-label">在线体验</div>
      <div class="unity-player-wrap" id="unity-container">
        <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>
        <div id="unity-loading-bar" role="status" aria-live="polite" aria-label="资源加载中">
          <div class="loading-logo" aria-hidden="true">🎮</div>
          <div class="loading-title">正在加载 WebGL 构建…</div>
          <div id="unity-progress-bar-empty">
            <div id="unity-progress-bar-full"></div>
          </div>
        </div>
        <div id="unity-warning"></div>
        <button type="button" id="unity-fullscreen-button" title="全屏">⛶</button>
      </div>
    </div>
  </div>

  <footer>
    <p>© 2026 xieliujian</p>
  </footer>

  <script>
    (function () {
      // 与 effect/boxprojectedcubemap 相同：同页 webgl/Build/；可自 com.spacetime.effect.sample.sunshaft 仓库 main 同步整份 webgl/
      var webglBase = "webgl";
      var buildUrl = webglBase + "/Build";
      var loaderUrl = buildUrl + "/webgl.loader.js";
      var config = {
        dataUrl: buildUrl + "/webgl.data",
        frameworkUrl: buildUrl + "/webgl.framework.js",
        codeUrl: buildUrl + "/webgl.wasm",
        streamingAssetsUrl: webglBase + "/StreamingAssets",
        companyName: "DefaultCompany",
        productName: "My project",
        productVersion: "0.1"
      };

      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");

      function unityShowBanner(msg, type) {
        if (!warningBanner) return;
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }
        var div = document.createElement("div");
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type === "error") {
          div.setAttribute("style", "background: red; padding: 10px;");
        } else {
          if (type === "warning") {
            div.setAttribute("style", "background: yellow; color: #000; padding: 10px;");
          }
          setTimeout(function () {
            if (div.parentNode === warningBanner) {
              warningBanner.removeChild(div);
            }
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      config.showBanner = unityShowBanner;

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = function () {
        if (typeof createUnityInstance !== "function") {
          if (loadingBar) {
            loadingBar.innerHTML = "<p style='color:#f85149;padding:1.5rem;text-align:center;'>未找到 <code>createUnityInstance</code>，请确认 <code>webgl.loader.js</code> 已正确加载。</p>";
          }
          return;
        }
        createUnityInstance(canvas, config, function (progress) {
          if (progressBarFull) {
            progressBarFull.style.width = 100 * progress + "%";
          }
        }).then(function (unityInstance) {
          if (loadingBar) {
            loadingBar.style.display = "none";
          }
          if (fullscreenButton && unityInstance) {
            fullscreenButton.onclick = function () {
              unityInstance.SetFullscreen(1);
            };
          }
        }).catch(function (message) {
          if (loadingBar) {
            loadingBar.innerHTML = "<div style='color:#f85149;padding:2rem;text-align:center;'><div style='font-size:1.5rem;margin-bottom:0.5rem;'>⚠️</div><div>" + String(message) + "</div></div>";
          }
        });
      };
      script.onerror = function () {
        if (loadingBar) {
          loadingBar.innerHTML = "<p style='color:#f85149;padding:1.5rem;text-align:center;'>无法加载 <code>webgl.loader.js</code>。请检查网络或 CDN。</p>";
        }
      };
      document.head.appendChild(script);
    })();
  </script>
</body>
</html>
